# Live-Demo: baut die App und veröffentlicht sie via GitHub Pages unter
# https://cendova.github.io/cendova-plan/ — reines Frontend, DICOM-Daten
# bleiben im Browser der Besucher. Ohne Schablonen-Paket sind Messungen,
# Pläne und PDF voll nutzbar; Templating zeigt den Paket-Hinweis.
name: Demo (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Rechte am Workflow minimal; die schreibenden Pages-Rechte nur im Deploy-Job
# (Security-Report §13). Actions auf Commit-SHA gepinnt (kein veränderliches
# Major-Tag als Supply-Chain-Fläche).
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        with:
          # Aktiviert Pages beim ersten Lauf automatisch (Quelle: Actions).
          enablement: true
      - run: npm ci
      # npm hängt Zusatz-Argumente ans Skript-Ende, `--base` erreicht also
      # `vite build`: die Demo liegt unter dem Unterpfad /cendova-plan/.
      - run: npm run build -- --base=/cendova-plan/
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
