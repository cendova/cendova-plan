# Release-Automation: Ein Tag `v*` (Push) ODER ein manueller Start mit
# Tag-Name erzeugt das zugehörige GitHub-Release; beim manuellen Start
# wird der Tag am aktuellen Stand serverseitig mit angelegt.
# Die Release-Notes kommen aus docs/releases/<tag>.md; fehlt die Datei,
# werden die Notes automatisch aus den Commits generiert.
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag-Name (z. B. v0.1.0) — wird bei Bedarf erzeugt'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Action auf Commit-SHA gepinnt (Security-Report §13). gh nutzt den
      # GH_TOKEN aus der Env, nicht die Checkout-Credentials.
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Installer-Pakete schnüren
        # Je Plattform ein ZIP: Windows braucht Installieren.cmd + install.ps1
        # nebeneinander; das ZIP erhält beim Mac-Installer das Ausführungsrecht.
        run: |
          mkdir -p /tmp/assets
          zip -j /tmp/assets/CendovaPlan-Installer-Windows.zip \
            installer/Installieren.cmd installer/install.ps1 installer/LIESMICH.txt
          zip -j /tmp/assets/CendovaPlan-Installer-macOS.zip \
            installer/install-mac.command installer/LIESMICH.txt
      - name: Release erzeugen
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          notes="docs/releases/${tag}.md"
          # Idempotent: existiert das Release schon, Notes/Titel aktualisieren
          # und die Installer-ZIPs ersetzen.
          if gh release view "$tag" >/dev/null 2>&1; then
            if [ -f "$notes" ]; then
              gh release edit "$tag" --title "CendovaPlan $tag" --notes-file "$notes"
            fi
            gh release upload "$tag" /tmp/assets/*.zip --clobber
            exit 0
          fi
          args=(--title "CendovaPlan $tag")
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            args+=(--target "$GITHUB_SHA")
          else
            args+=(--verify-tag)
          fi
          if [ -f "$notes" ]; then
            args+=(--notes-file "$notes")
          else
            args+=(--generate-notes)
          fi
          gh release create "$tag" "${args[@]}" /tmp/assets/*.zip
