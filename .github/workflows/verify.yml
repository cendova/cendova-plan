# CI-Verifikation bei jedem Push/PR: entspricht `npm run verify` aus dem
# Test-Runbook (Typecheck + Unit-Tests + Build, alle exit 0).
name: Verifikation

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
