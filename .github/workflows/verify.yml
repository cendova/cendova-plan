# CI-Verifikation bei jedem Push/PR: entspricht `npm run verify` aus dem
# Test-Runbook (Typecheck + Unit-Tests + Build, alle exit 0).
name: Verifikation

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # Actions auf Commit-SHA gepinnt (Security-Report §13).
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
